{% extends "base.html" %}
{% block title %}Personel Girişi — RandevuCum{% endblock %}

{% block extra_head %}
<style>
body { background: #0d0d16 !important; }
.staff-login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}
.staff-login-card {
  background: rgba(255,255,255,.04); backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.09); border-radius: 24px;
  padding: 40px 36px; width: 100%; max-width: 400px;
  box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(124,58,237,.08);
}
.staff-logo { text-align: center; margin-bottom: 28px; }
.staff-logo-icon {
  width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 12px;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 8px 28px rgba(124,58,237,.4);
}
.staff-logo-title { font-size: 1.4rem; font-weight: 900; color: #f1f0f5; }
.staff-logo-sub   { font-size: .82rem; color: rgba(196,181,253,.55); margin-top: 2px; }

.sl-label {
  font-size: .72rem; font-weight: 800; letter-spacing: .08em;
  color: rgba(196,181,253,.55); margin-bottom: 6px; display: block;
}
.sl-input {
  width: 100%; background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px; color: #f1f0f5; font-size: .95rem; padding: 12px 16px;
  font-family: inherit; transition: all .15s; margin-bottom: 16px;
}
.sl-input:focus { outline: none; border-color: rgba(124,58,237,.5); box-shadow: 0 0 0 3px rgba(124,58,237,.18); }
.sl-input::placeholder { color: rgba(196,181,253,.3); }
.sl-btn {
  width: 100%; padding: 14px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, #7c3aed, #ec4899, #06b6d4);
  background-size: 200% 200%; color: white; font-size: 1rem;
  font-weight: 800; cursor: pointer; font-family: inherit;
  box-shadow: 0 4px 20px rgba(124,58,237,.4);
  animation: gradShift 4s ease infinite;
  transition: opacity .15s; margin-top: 4px;
}
.sl-btn:hover { opacity: .9; }
@keyframes gradShift {
  0%,100%{background-position:0% 50%} 50%{background-position:100% 50%}
}
.sl-error {
  background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25);
  border-radius: 10px; padding: 10px 14px; color: #fca5a5;
  font-size: .85rem; font-weight: 600; margin-bottom: 16px;
}
.sl-divider {
  border: none; border-top: 1px solid rgba(255,255,255,.07); margin: 24px 0;
}
.sl-biz-link {
  display: block; text-align: center; font-size: .8rem;
  color: rgba(196,181,253,.45); text-decoration: none;
}
.sl-biz-link:hover { color: #c4b5fd; }
</style>
{% endblock %}

{% block content %}
<div class="staff-login-wrap">
  <div class="staff-login-card">
    <div class="staff-logo">
      <div class="staff-logo-icon">👤</div>
      <div class="staff-logo-title">Personel Girişi</div>
      <div class="staff-logo-sub">RandevuCum — Personel Portalı</div>
    </div>

    {% if error %}
    <div class="sl-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="post" action="/personel/giris">
      <label class="sl-label">TELEFON NUMARASI</label>
      <input type="tel" name="phone" class="sl-input" placeholder="05xx xxx xx xx" required autofocus>

      <label class="sl-label">PIN KODU</label>
      <input type="password" name="pin" class="sl-input" placeholder="••••" maxlength="6" required
             inputmode="numeric" pattern="[0-9]*">

      <button type="submit" class="sl-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Giriş Yap
      </button>
    </form>

    <hr class="sl-divider">
    <a href="/giris" class="sl-biz-link">
      <i class="bi bi-building me-1"></i>İşletme girişi için tıklayın
    </a>
  </div>
</div>
{% endblock %}
