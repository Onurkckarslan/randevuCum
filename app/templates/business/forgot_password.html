{% extends "base.html" %}
{% block title %}Şifremi Unuttum — RandevuCum{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5 shadow-lg" style="border: 1px solid rgba(255,255,255,.1); background: rgba(19,19,26,.95);">
                <h2 class="text-center mb-4" style="color: #c4b5fd;">Şifremi Unuttum</h2>

                {% if message %}
                <div class="alert alert-info" role="alert" style="background: rgba(6,182,212,.15); border: 1px solid rgba(6,182,212,.3); color: #22d3ee;">
                    {{ message }}
                </div>
                {% endif %}

                <form method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label" style="color: #c4b5fd;">E-posta Adresi</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               style="background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.1); color: #fff;">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2" style="background: #7c3aed; border: none;">
                        Reset Linki Gönder
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p style="color: rgba(196,181,253,.6);">
                        Hesabın var mı?
                        <a href="/giris" style="color: #a78bfa; text-decoration: none;">Giriş Yap</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
