<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Giriş — RandevuCum</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 700px 500px at 10% 20%, rgba(124,58,237,.18) 0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 90% 80%, rgba(236,72,153,.12) 0%, transparent 70%);
}
.card {
  position: relative; z-index: 1;
  background: rgba(18,12,30,.9); border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 400px;
  box-shadow: 0 40px 80px rgba(0,0,0,.5);
}
.logo {
  text-align: center; margin-bottom: 32px;
}
.logo-icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, #3b1d8a, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px; font-size: 1.6rem;
  box-shadow: 0 4px 20px rgba(124,58,237,.4);
}
.logo h1 { font-size: 1.4rem; font-weight: 900; color: #fff; }
.logo h1 span { color: #a78bfa; }
.logo p { font-size: .8rem; color: rgba(196,181,253,.5); margin-top: 4px; }
label { display: block; font-size: .8rem; font-weight: 700; color: rgba(196,181,253,.7); margin-bottom: 8px; letter-spacing: .06em; }
input[type=password] {
  width: 100%; padding: 13px 16px;
  background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px; color: #f1f0f5; font-size: .95rem;
  outline: none; transition: border-color .2s, box-shadow .2s;
  font-family: inherit; margin-bottom: 20px;
}
input[type=password]:focus {
  border-color: rgba(124,58,237,.6);
  box-shadow: 0 0 0 3px rgba(124,58,237,.15);
}
button {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #7c3aed, #ec4899);
  border: none; border-radius: 14px; color: white;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,58,237,.4);
  transition: transform .15s, box-shadow .15s; font-family: inherit;
}
button:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,.6); }
.error {
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
  color: #fca5a5; border-radius: 10px; padding: 10px 14px;
  font-size: .85rem; margin-bottom: 16px; text-align: center;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Randevu<span>Cum</span></h1>
    <p>Admin Paneli</p>
  </div>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}
  <form method="post" action="/admin/login">
    <label>ADMIN ŞİFRESİ</label>
    <input type="password" name="password" placeholder="••••••••" autofocus>
    <button type="submit">Giriş Yap →</button>
  </form>
</div>
</body>
</html>
